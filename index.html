<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── HEADER ── */
  .header { background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%); padding: 36px 20px 28px; text-align: center; border-bottom: 3px solid #f48fb1; position: relative; overflow: hidden; }

  .cat-row span { animation: catBounce 1.5s ease-in-out infinite; }
  .cat-row span:nth-child(2) { animation-delay: 0.3s; }
  .cat-row span:nth-child(3) { animation-delay: 0.6s; }
  @keyframes catBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  /* ── PROGRESS BAR ── */

  .progress-bar-bg { height: 12px; background: #fce4ec; border-radius: 10px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #f48fb1, #ce93d8, #9fa8da); border-radius: 10px; transition: width 0.4s ease; width: 0%; }
  .progress-text { font-size: 0.82em; color: #ad1457; margin-top: 4px; text-align: center; }

  /* ── CONTAINER ── */
  .container { max-width: 780px; margin: 0 auto; padding: 20px; }

  /* ── QUESTION CARD ── */
  .q-card { background: #fff; border-radius: 14px; margin-bottom: 18px; padding: 22px 24px; border: 2px solid #f8bbd0; box-shadow: 0 2px 8px rgba(173,20,87,0.06); transition: border-color 0.3s; }

  .q-card.review-correct { border-left: 5px solid #66bb6a; }
  .q-card.review-wrong { border-left: 5px solid #ef5350; }
  .q-num { font-size: 0.8em; font-weight: 700; color: #ad1457; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .q-topic { display: inline-block; background: #f3e5f5; color: #7b1fa2; padding: 2px 10px; border-radius: 12px; font-size: 0.72em; font-weight: 600; margin-left: 8px; }

  .q-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.88em; }
  .q-table th { background: #fce4ec; color: #ad1457; padding: 8px 10px; text-align: center; font-size: 0.85em; }

  .options-list li { padding: 11px 16px; margin-bottom: 7px; border-radius: 10px; border: 2px solid #f0e0e6; background: #fffbfc; cursor: pointer; transition: all 0.2s; font-size: 0.95em; }

  .options-list li.selected { border-color: #ab47bc; background: #f3e5f5; font-weight: 600; }
  .options-list li.selected::before { content: ""; display: inline-block; width: 10px; height: 10px; background: #ab47bc; border-radius: 50%; margin-right: 10px; }

  /* Review mode styles */
  .options-list li.r-correct { border-color: #66bb6a; background: #e8f5e9; cursor: default; }
  .options-list li.r-correct::before { content: "✓ "; color: #2e7d32; font-weight: bold; }
  .options-list li.r-wrong { border-color: #ef5350; background: #ffebee; text-decoration: line-through; opacity: 0.7; cursor: default; }
  .options-list li.r-wrong::before { content: "✗ "; color: #c62828; font-weight: bold; }
  .options-list li.r-right-answer { border-color: #66bb6a; background: #e8f5e9; cursor: default; }
  .options-list li.r-right-answer::before { content: "→ "; color: #2e7d32; font-weight: bold; }
  .options-list li.r-neutral { cursor: default; opacity: 0.55; }
  .options-list li.r-neutral:hover { border-color: #f0e0e6; background: #fffbfc; }

  /* ── EXPLANATION (hidden during quiz) ── */
  .explanation { display: none; margin-top: 14px; padding: 14px 16px; border-radius: 10px; font-size: 0.9em; line-height: 1.6; }
  .explanation.show { display: block; }
  .explanation.exp-correct { background: #e8f5e9; border-left: 4px solid #66bb6a; color: #2e7d32; }
  .explanation.exp-wrong { background: #fff3e0; border-left: 4px solid #ffa726; color: #e65100; }
  .explanation strong { color: inherit; }
  .cat-msg { margin-top: 10px; padding: 8px 14px; background: rgba(255,255,255,0.7); border-radius: 8px; font-style: italic; font-size: 0.9em; }

  /* ── GRAPH CONTAINERS ── */
  .graph-box { margin: 14px 0; background: #fafafa; border-radius: 10px; padding: 14px; border: 1px solid #f0e0e6; }
  .graph-box canvas { max-height: 240px; }
  .svg-graph { width: 100%; max-width: 380px; margin: 8px auto; display: block; }

  /* ── BUTTONS ── */
  .btn-wrap { text-align: center; margin: 30px 0; }
  .btn { padding: 14px 40px; font-size: 1.1em; font-weight: 700; border: none; border-radius: 30px; cursor: pointer; transition: all 0.3s; }
  .btn-submit { background: linear-gradient(135deg, #ec407a, #ab47bc); color: white; box-shadow: 0 4px 15px rgba(236,64,122,0.3); }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(236,64,122,0.4); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-retake { background: linear-gradient(135deg, #42a5f5, #ab47bc); color: white; box-shadow: 0 4px 15px rgba(66,165,245,0.3); }
  .btn-retake:hover { transform: translateY(-2px); }
  .btn-scroll { background: #f48fb1; color: white; padding: 10px 24px; font-size: 0.9em; border-radius: 20px; border: none; cursor: pointer; margin: 4px; }

  /* ── RESULTS BANNER ── */
  .results-banner { display: none; text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #fce4ec, #f3e5f5); border-radius: 16px; margin: 20px 0; border: 2px solid #f48fb1; }
  .results-banner.show { display: block; }
  .results-banner .big-score { font-size: 3.5em; font-weight: 800; color: #ad1457; }
  .results-banner .score-label { font-size: 1.1em; color: #6a1b9a; }
  .results-banner .cat-celebration { font-size: 2em; margin: 12px 0; }
  .results-banner .grade-msg { font-size: 1.15em; margin-top: 8px; color: #37474f; }
  .results-nav { display: flex; justify-content: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

  .hidden { display: none; }
  @media (max-width: 600px) { .header h1 { font-size: 1.5em; } .container { padding: 12px; } .q-card { padding: 16px; } }
</style>

// ── STATE ──
let userAnswers = {};
let submitted = false;

// ── RENDER QUIZ ──
function renderQuiz() {
  const area = document.getElementById('quizArea');
  let html = '';

  QUESTIONS.forEach((q, idx) => {
    html += `<div class="q-card" id="qcard-${q.id}">`;
    html += `<div class="q-num">Question ${q.id} <span class="q-topic">${q.topic}</span></div>`;
    html += `<p class="q-text">${q.text}</p>`;

    // Table if present
    if (q.table) {
      html += '<table class="q-table"><tr>';
      q.table.headers.forEach(h => html += `<th>${h}</th>`);
      html += '</tr>';
      q.table.rows.forEach(row => {
        html += '<tr>';
        row.forEach(cell => html += `<td>${cell}</td>`);
        html += '</tr>';
      });
      html += '</table>';
    }

    // Graph placeholder
    if (q.hasGraph) {
      html += `<div class="graph-box" id="graph-${q.id}"></div>`;
    }

    // Options
    html += `<ul class="options-list" id="opts-${q.id}">`;
    q.opts.forEach((opt, oi) => {
      html += `<li onclick="selectAnswer(${q.id}, ${oi}, this)" id="opt-${q.id}-${oi}">${opt}</li>`;
    });
    html += '</ul>';

    // Explanation (hidden until review)
    html += `<div class="explanation" id="exp-${q.id}"></div>`;
    html += '</div>';
  });

  // Submit button
  html += `<div class="btn-wrap" id="submitWrap">
    <button class="btn btn-submit" id="submitBtn" onclick="submitQuiz()">
      🐱 Submit Quiz — Let's See How You Did! 🐈
    </button>
    <p style="color:#ad1457; font-size:0.85em; margin-top:8px;" id="submitHint">Answer all 35 questions first!</p>
  </div>`;

  // Results banner (hidden)
  html += `<div class="results-banner" id="resultsBanner"></div>`;

  area.innerHTML = html;
  drawGraphs();
}

// ── SELECT ANSWER ──
function selectAnswer(qid, optIdx, el) {
  if (submitted) return;
  userAnswers[qid] = optIdx;

  // Update visual
  const opts = document.querySelectorAll(`#opts-${qid} li`);
  opts.forEach(li => li.classList.remove('selected'));
  el.classList.add('selected');

  // Update card border
  document.getElementById(`qcard-${qid}`).classList.add('answered');

  updateProgress();
}

// ── PROGRESS ──
function updateProgress() {
  const count = Object.keys(userAnswers).length;
  const pct = (count / 35) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${count} of 35 answered`;

  const hint = document.getElementById('submitHint');
  if (count === 35) {
    hint.textContent = "All done! Hit submit whenever you're ready!";
    hint.style.color = '#2e7d32';
  } else {
    hint.textContent = `${35 - count} questions remaining`;
    hint.style.color = '#ad1457';
  }
}

// ── SUBMIT ──
function submitQuiz() {
  const unanswered = 35 - Object.keys(userAnswers).length;
  if (unanswered > 0) {
    if (!confirm(`You still have ${unanswered} unanswered question(s). Submit anyway? (Unanswered = wrong)`)) return;
  }

  submitted = true;

  let correct = 0;
  let wrongIds = [];

  QUESTIONS.forEach(q => {
    const userAns = userAnswers[q.id];
    const isCorrect = userAns === q.answer;
    if (isCorrect) correct++;
    else wrongIds.push(q.id);

    const card = document.getElementById(`qcard-${q.id}`);
    card.classList.remove('answered');
    card.classList.add(isCorrect ? 'review-correct' : 'review-wrong');

    // Style options
    const opts = document.querySelectorAll(`#opts-${q.id} li`);
    opts.forEach((li, oi) => {
      li.onclick = null;
      li.style.cursor = 'default';
      if (oi === q.answer && isCorrect) {
        li.className = 'r-correct';
      } else if (oi === userAns && !isCorrect) {
        li.className = 'r-wrong';
      } else if (oi === q.answer && !isCorrect) {
        li.className = 'r-right-answer';
      } else {
        li.className = 'r-neutral';
      }
    });

    // Show explanation
    const expDiv = document.getElementById(`exp-${q.id}`);
    expDiv.classList.add('show', isCorrect ? 'exp-correct' : 'exp-wrong');
    if (isCorrect) {
      expDiv.innerHTML = `<strong>✓ Correct!</strong> ${q.explain}<div class="cat-msg">${q.catMsg}</div>`;
    } else {
      expDiv.innerHTML = `<strong>✗ Not quite!</strong> ${q.explain}<div class="cat-msg">${q.catMsg}</div>`;
    }
  });

  // Hide submit button
  document.getElementById('submitWrap').style.display = 'none';

  // Show results banner
  const pct = Math.round((correct/35)*100);
  let grade, celebration;
  if (pct >= 90) { grade = "Pie, Cookie, and Niko are SO proud of you! You're crushing it!"; celebration = "🐱🎉🐱✨🐈🌟"; }
  else if (pct >= 80) { grade = "Great job, Cecelia! Almost perfect — just a few to review!"; celebration = "🐱👏🐱💪🐈"; }
  else if (pct >= 70) { grade = "Solid work! Review the red ones below and you'll ace the real test!"; celebration = "🐱📖🐱💡🐈"; }
  else if (pct >= 60) { grade = "Good start! Pie, Cookie, and Niko believe in you — focus on the explanations below!"; celebration = "🐱❤️🐱📚🐈"; }
  else { grade = "Don't worry! Every wrong answer is a learning moment. Pie, Cookie, and Niko are here to help!"; celebration = "🐱🤗🐱💕🐈"; }

  const banner = document.getElementById('resultsBanner');
  banner.classList.add('show');
  banner.innerHTML = `
    <div class="cat-celebration">${celebration}</div>
    <div class="big-score">${correct}/35</div>
    <div class="score-label">${pct}% — ${correct} correct, ${35-correct} to review</div>
    <div class="grade-msg">${grade}</div>
    ${wrongIds.length > 0 ? `
    <div class="results-nav" style="margin-top:16px;">
      <p style="font-size:0.85em; color:#ad1457; width:100%; margin-bottom:6px;">Jump to missed questions:</p>
      ${wrongIds.map(id => `<button class="btn-scroll" onclick="document.getElementById('qcard-${id}').scrollIntoView({behavior:'smooth',block:'center'})">Q${id}</button>`).join('')}
    </div>` : ''}
    <div style="margin-top:20px;">
      <button class="btn btn-retake" onclick="location.reload()">🔄 Retake Quiz</button>
    </div>
  `;
  banner.scrollIntoView({ behavior: 'smooth' });

  // Update progress bar
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressFill').style.background = pct >= 80 ? 'linear-gradient(90deg, #66bb6a, #43a047)' : 'linear-gradient(90deg, #ffa726, #ef5350)';
  document.getElementById('progressText').textContent = `Score: ${correct}/35 (${pct}%)`;
}
